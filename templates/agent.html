<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>K8s Agent — Chat + Traces</title>
  <style>
    :root { --bg: #0d1117; --surface: #161b22; --border: #30363d; --text: #c9d1d9;
            --cyan: #58a6ff; --green: #3fb950; --red: #f85149; --dim: #8b949e; --yellow: #d29922; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'SF Mono', Consolas, monospace;
           display: flex; flex-direction: column; height: 100vh; font-size: 14px; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px;
             display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 16px; color: var(--cyan); font-weight: 600; }
    header .badge { background: var(--green); color: #000; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
    #chat { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 85%; padding: 10px 14px; border-radius: 8px; line-height: 1.5; }
    .msg.user { background: #1f6feb22; border: 1px solid #1f6feb44; align-self: flex-end; color: var(--cyan); }
    .msg.agent { background: var(--surface); border: 1px solid var(--border); align-self: flex-start; }
    .msg.agent pre { white-space: pre-wrap; word-wrap: break-word; margin: 8px 0 0; background: #0d1117;
                     padding: 8px; border-radius: 4px; font-size: 13px; }
    .steps { margin-top: 8px; border-top: 1px solid var(--border); padding-top: 8px; }
    .steps summary { cursor: pointer; color: var(--dim); font-size: 12px; }
    .step { padding: 4px 0; font-size: 12px; border-left: 2px solid var(--border); padding-left: 10px; margin: 4px 0; }
    .step .tool-name { color: var(--cyan); font-weight: 600; }
    .step .timing { color: var(--dim); }
    .step .ok { color: var(--green); }
    .step .err { color: var(--red); }
    .step-result { background: #0d1117; padding: 4px 8px; border-radius: 4px; margin-top: 2px;
                   max-height: 120px; overflow-y: auto; font-size: 11px; color: var(--dim); white-space: pre-wrap; }
    #input-bar { background: var(--surface); border-top: 1px solid var(--border); padding: 12px 20px;
                 display: flex; gap: 10px; }
    #input-bar input { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text);
                       padding: 10px 14px; border-radius: 6px; font-family: inherit; font-size: 14px; outline: none; }
    #input-bar input:focus { border-color: var(--cyan); }
    #input-bar button { background: var(--cyan); color: #000; border: none; padding: 10px 20px;
                        border-radius: 6px; font-weight: 600; cursor: pointer; font-family: inherit; }
    #input-bar button:disabled { opacity: 0.4; cursor: not-allowed; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--dim);
               border-top-color: var(--cyan); border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .meta { font-size: 11px; color: var(--dim); margin-top: 6px; }
  </style>
</head>
<body>
  <header>
    <h1>⎈ K8s Agent</h1>
    <span class="badge">ReAct + Tools</span>
    <span style="color: var(--dim); font-size: 12px; margin-left: auto;">POST /agent/invoke</span>
  </header>

  <div id="chat"></div>

  <div id="input-bar">
    <input id="query" type="text" placeholder="Ask about your cluster..." autofocus
           onkeydown="if(event.key==='Enter')send()" />
    <button id="btn" onclick="send()">Send</button>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('query');
    const btn = document.getElementById('btn');

    function addMsg(cls, html) {
      const d = document.createElement('div');
      d.className = 'msg ' + cls;
      d.innerHTML = html;
      chat.appendChild(d);
      chat.scrollTop = chat.scrollHeight;
      return d;
    }

    function renderSteps(steps) {
      if (!steps || !steps.length) return '';
      let html = '<div class="steps"><details><summary>🔍 ' + steps.length + ' steps — click to expand</summary>';
      for (const s of steps) {
        if (s.type === 'tool_call') {
          const status = s.error ? `<span class="err">✗ ${esc(s.error)}</span>` : `<span class="ok">✓</span>`;
          html += `<div class="step">
            <span class="tool-name">${esc(s.name)}</span> ${status}
            <span class="timing">${s.llm_ms || 0}ms LLM + ${s.tool_ms || 0}ms tool</span>`;
          if (s.args) html += `<div class="step-result">Args: ${esc(JSON.stringify(s.args))}</div>`;
          if (s.result) html += `<div class="step-result">${esc(s.result)}</div>`;
          html += '</div>';
        } else if (s.type === 'final') {
          html += `<div class="step"><span class="ok">✓ Final answer</span> <span class="timing">${s.llm_ms}ms</span></div>`;
        }
      }
      html += '</details></div>';
      return html;
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }

    async function send() {
      const q = input.value.trim();
      if (!q) return;
      input.value = '';
      btn.disabled = true;

      addMsg('user', esc(q));
      const thinking = addMsg('agent', '<span class="spinner"></span> Thinking...');

      try {
        const t0 = Date.now();
        const res = await fetch('/agent/invoke', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({query: q, max_steps: 10})
        });
        const data = await res.json();
        const elapsed = Date.now() - t0;

        if (!res.ok) throw new Error(data.detail || 'Agent error');

        const resp = (data.response || '').replace(/\n/g, '<br>');
        thinking.innerHTML = resp + renderSteps(data.steps)
          + `<div class="meta">${elapsed}ms total · ${(data.steps||[]).length} steps</div>`;
      } catch(e) {
        thinking.innerHTML = `<span class="err">Error: ${esc(e.message)}</span>`;
      }
      btn.disabled = false;
      input.focus();
    }
  </script>
</body>
</html>
